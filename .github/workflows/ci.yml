# ============================================================================
# CI/CD Pipeline for ShasthyaHub-AI
# ============================================================================
#
# Required GitHub Secrets:
#
# For build check (use dummy values if real ones aren't set up yet):
#   NEXT_PUBLIC_SUPABASE_URL    → https://dummy.supabase.co
#   NEXT_PUBLIC_SUPABASE_ANON_KEY → dummy-anon-key
#   NEXT_PUBLIC_APP_URL          → http://localhost:3000
#
# For Vercel deployment:
#   VERCEL_TOKEN      → Get from https://vercel.com/account/tokens
#   VERCEL_ORG_ID     → Run `vercel link` then check .vercel/project.json
#   VERCEL_PROJECT_ID → Run `vercel link` then check .vercel/project.json
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # JOB 1: Check — Type check, Lint, Build
  # --------------------------------------------------------------------------
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint check
        run: npm run lint

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy-anon-key' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}

  # --------------------------------------------------------------------------
  # JOB 2: Deploy Preview — Vercel preview on pull requests
  # --------------------------------------------------------------------------
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (Preview)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-version: '47'
          working-directory: ./

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const vercelOutput = '${{ steps.deploy.outputs.preview-url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Vercel Preview Deployed\n\n**Preview URL:** ${vercelOutput}\n\nThis preview will be automatically deleted when the PR is closed.`
            })

  # --------------------------------------------------------------------------
  # JOB 3: Deploy Production — Vercel production on push to main
  # --------------------------------------------------------------------------
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-version: '47'
          vercel-args: --prod
          working-directory: ./
